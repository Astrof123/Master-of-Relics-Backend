networks:
  dev:

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./Master-of-Relics-Backend/.env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master_of_relics -d master_of_relics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redislabs/rejson:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --loadmodule /usr/lib/redis/modules/rejson.so --appendonly yes
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - '/etc/letsencrypt:/etc/letsencrypt'
    depends_on:
      - backend
      - frontend
    networks:
      - dev
    

  backend:
    build:
      context: ./Master-of-Relics-Backend
    env_file:
      - ./Master-of-Relics-Backend/.env
    networks:
      - dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./Master-of-Relics-Frontend
    networks:
      - dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: